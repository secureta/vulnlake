name: publish-docs
on:
  push:
    branches: [main]
    paths:
      - docs/llms.md
      - .github/workflows/publish-docs.yml
  workflow_dispatch:
permissions:
  contents: read  # checkout のみ。GITHUB_TOKEN の権限を最小化 (書き込み先は S3 のみ)
concurrency:
  group: publish-docs
  cancel-in-progress: false
jobs:
  publish-docs:
    runs-on: ubuntu-latest
    environment: publish  # Secrets/Variables は publish Environment を再利用
    env:
      VLAKE_S3_ENDPOINT: ${{ secrets.VLAKE_S3_ENDPOINT }}
      VLAKE_S3_BUCKET: ${{ secrets.VLAKE_S3_BUCKET }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: auto
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: publish llms.txt
        run: |
          aws s3 cp docs/llms.md "s3://$VLAKE_S3_BUCKET/llms.txt" \
            --endpoint-url "$VLAKE_S3_ENDPOINT" \
            --content-type 'text/markdown; charset=utf-8' \
            --cache-control 'public, max-age=3600'
