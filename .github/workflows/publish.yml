name: publish
on:
  schedule:
    - cron: "30 14 * * *"  # EPSS 更新 (~13:30 UTC) の後。cvelistV5 baseline は 00:00 UTC 断面
  workflow_dispatch:
permissions:
  contents: read  # checkout のみ。GITHUB_TOKEN の権限を最小化 (書き込み先は S3 のみ)
concurrency:
  group: publish
  cancel-in-progress: false
jobs:
  update:
    runs-on: ubuntu-latest
    environment: publish  # Secrets/Variables はこの Environment に置く (ブランチ保護付き)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - run: uv sync
      - run: uv run vlake update epss
        env:
          VLAKE_S3_ENDPOINT: ${{ secrets.VLAKE_S3_ENDPOINT }}
          VLAKE_S3_BUCKET: ${{ secrets.VLAKE_S3_BUCKET }}
          VLAKE_PUBLIC_URL: ${{ vars.VLAKE_PUBLIC_URL }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
      - run: uv run vlake update cve
        env:
          VLAKE_S3_ENDPOINT: ${{ secrets.VLAKE_S3_ENDPOINT }}
          VLAKE_S3_BUCKET: ${{ secrets.VLAKE_S3_BUCKET }}
          VLAKE_PUBLIC_URL: ${{ vars.VLAKE_PUBLIC_URL }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          GITHUB_TOKEN: ${{ github.token }}  # Releases API のレート制限回避
      - run: uv run vlake update ghsa
        env:
          VLAKE_S3_ENDPOINT: ${{ secrets.VLAKE_S3_ENDPOINT }}
          VLAKE_S3_BUCKET: ${{ secrets.VLAKE_S3_BUCKET }}
          VLAKE_PUBLIC_URL: ${{ vars.VLAKE_PUBLIC_URL }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
      - run: uv run vlake update exploitdb
        env:
          VLAKE_S3_ENDPOINT: ${{ secrets.VLAKE_S3_ENDPOINT }}
          VLAKE_S3_BUCKET: ${{ secrets.VLAKE_S3_BUCKET }}
          VLAKE_PUBLIC_URL: ${{ vars.VLAKE_PUBLIC_URL }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
      - run: uv run vlake update nuclei
        env:
          VLAKE_S3_ENDPOINT: ${{ secrets.VLAKE_S3_ENDPOINT }}
          VLAKE_S3_BUCKET: ${{ secrets.VLAKE_S3_BUCKET }}
          VLAKE_PUBLIC_URL: ${{ vars.VLAKE_PUBLIC_URL }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
      - run: uv run vlake verify --max-age-days 3
        env:
          VLAKE_S3_ENDPOINT: ${{ secrets.VLAKE_S3_ENDPOINT }}
          VLAKE_S3_BUCKET: ${{ secrets.VLAKE_S3_BUCKET }}
          VLAKE_PUBLIC_URL: ${{ vars.VLAKE_PUBLIC_URL }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
