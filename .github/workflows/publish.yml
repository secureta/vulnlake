name: publish
on:
  schedule:
    - cron: "30 14 * * *"  # EPSS 更新 (~13:30 UTC) の後。cvelistV5 baseline は 00:00 UTC 断面
  workflow_dispatch:
permissions:
  contents: read  # checkout のみ。GITHUB_TOKEN の権限を最小化 (書き込み先は S3 のみ)
concurrency:
  group: publish
  cancel-in-progress: false
jobs:
  update:
    runs-on: ubuntu-latest
    environment: publish  # Secrets/Variables はこの Environment に置く (ブランチ保護付き)
    env:
      VLAKE_S3_ENDPOINT: ${{ secrets.VLAKE_S3_ENDPOINT }}
      VLAKE_S3_BUCKET: ${{ secrets.VLAKE_S3_BUCKET }}
      VLAKE_PUBLIC_URL: ${{ vars.VLAKE_PUBLIC_URL }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: auto
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - run: uv sync
      # 各データセットは continue-on-error で独立させ、1つの失敗が他の更新と
      # verify を止めないようにする。失敗は末尾の集計ステップでジョブ失敗に変換する
      - id: epss
        continue-on-error: true
        run: uv run vlake update epss
      - id: cve
        continue-on-error: true
        run: uv run vlake update cve
        env:
          GITHUB_TOKEN: ${{ github.token }}  # Releases API のレート制限回避
      - id: ghsa
        continue-on-error: true
        run: uv run vlake update ghsa
      - id: exploitdb
        continue-on-error: true
        run: uv run vlake update exploitdb
      - id: nuclei
        continue-on-error: true
        run: uv run vlake update nuclei
      - id: cwe
        continue-on-error: true
        run: uv run vlake update cwe
      - id: kev
        continue-on-error: true
        run: uv run vlake update kev
      - id: cloudflare_waf
        continue-on-error: true
        run: uv run vlake update cloudflare_waf
      - id: attack
        continue-on-error: true
        run: uv run vlake update attack
      - id: capec
        continue-on-error: true
        run: uv run vlake update capec
      - run: uv run vlake verify --max-age-days 3
      - name: check update failures
        if: contains(steps.*.outcome, 'failure')
        env:
          STEPS: ${{ toJSON(steps) }}
        run: |
          echo "failed datasets:"
          echo "$STEPS" | jq -r 'to_entries[] | select(.value.outcome == "failure") | "  - " + .key'
          exit 1
